{% extends 'base.html' %}
{% block content %}
<div class="post-box">
    <h1>{{ post.title }}</h1>
    <p class="post-meta">작성자: {{ post.author.username }}</p>
    <div class="post-content">{{ post.content }}</div>

    <div class="post-actions">
        {% if current_user.is_authenticated and current_user.id == post.user_id %}
            <a href="/edit/{{ post.id }}" class="btn-edit">수정</a>
            <a href="#" class="btn-delete" onclick="confirmDelete({{ post.id }})">삭제</a>
        {% endif %}
        <a href="/" class="btn-back">목록으로</a>
    </div>
</div>
{% endblock %}
