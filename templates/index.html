{% extends 'base.html' %}
{% block content %}
<h1>게시판</h1>
<table>
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
    </tr>
    {% for post in posts %}
    <tr>
        <td>{{ post.id }}</td>
        <td><a href="/post/{{ post.id }}">{{ post.title }}</a></td>
        <td>{{ post.author.username }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
